<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeChat Bot 消息统计</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        color: white;
        text-align: center;
        margin-bottom: 30px;
        font-size: 2.5rem;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .stats-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
      }

      .stat-card:hover {
        transform: translateY(-5px);
      }

      .stat-value {
        font-size: 2.5rem;
        font-weight: bold;
        color: #667eea;
      }

      .stat-label {
        color: #666;
        margin-top: 5px;
        font-size: 1rem;
      }

      .chart-container {
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        margin-bottom: 30px;
      }

      .chart-title {
        font-size: 1.5rem;
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 2px solid #eee;
      }

      .chart-wrapper {
        position: relative;
        height: 400px;
      }

      .controls {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .control-group label {
        color: #333;
        font-weight: 600;
      }

      .control-group select,
      .control-group input {
        padding: 10px 15px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.3s;
      }

      .control-group select:focus,
      .control-group input:focus {
        outline: none;
        border-color: #667eea;
      }

      .btn {
        padding: 10px 25px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s;
      }

      .btn:hover {
        background: #5a6fd6;
      }

      .table-container {
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #eee;
      }

      th {
        background: #f8f9fa;
        font-weight: 600;
        color: #333;
      }

      tr:hover {
        background: #f8f9fa;
      }

      .no-data {
        text-align: center;
        color: #999;
        padding: 40px;
      }

      .loading {
        text-align: center;
        padding: 50px;
        color: #667eea;
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📊 WeChat Bot 消息统计</h1>

      <!-- 统计卡片 -->
      <div class="stats-cards">
        <div class="stat-card">
          <div class="stat-value" id="totalMessages">0</div>
          <div class="stat-label">总消息数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="todayMessages">0</div>
          <div class="stat-label">今日消息数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="avgPerMinute">0</div>
          <div class="stat-label">平均/分钟</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="maxPerMinute">0</div>
          <div class="stat-label">峰值/分钟</div>
        </div>
      </div>

      <!-- 分钟统计图表 -->
      <div class="chart-container">
        <div class="controls">
          <div class="control-group">
            <label for="hoursRange">时间范围:</label>
            <select id="hoursRange">
              <option value="1">1小时</option>
              <option value="6">6小时</option>
              <option value="12">12小时</option>
              <option value="24" selected>24小时</option>
              <option value="48">48小时</option>
            </select>
          </div>
          <button class="btn" onclick="loadMinuteData()">刷新数据</button>
        </div>
        <h2 class="chart-title">📈 每分钟消息数量趋势</h2>
        <div class="chart-wrapper">
          <canvas id="minuteChart"></canvas>
        </div>
      </div>

      <!-- 小时统计图表 -->
      <div class="chart-container">
        <div class="controls">
          <div class="control-group">
            <label for="daysRange">时间范围:</label>
            <select id="daysRange">
              <option value="1">1天</option>
              <option value="3">3天</option>
              <option value="7" selected>7天</option>
              <option value="30">30天</option>
            </select>
          </div>
          <button class="btn" onclick="loadHourData()">刷新数据</button>
        </div>
        <h2 class="chart-title">📉 每小时消息数量趋势</h2>
        <div class="chart-wrapper">
          <canvas id="hourChart"></canvas>
        </div>
      </div>

      <!-- 群聊消息排行 -->
      <div class="table-container">
        <h2 class="chart-title">🏆 群聊消息排行</h2>
        <table id="groupTable">
          <thead>
            <tr>
              <th>排名</th>
              <th>群聊名称</th>
              <th>消息数量</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="3" class="no-data">加载中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      let minuteChart, hourChart;

      // 初始化图表
      function initCharts() {
        const minuteCtx = document
          .getElementById("minuteChart")
          .getContext("2d");
        minuteChart = new Chart(minuteCtx, {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                label: "消息数",
                data: [],
                borderColor: "#667eea",
                backgroundColor: "rgba(102, 126, 234, 0.1)",
                fill: true,
                tension: 0.4,
                pointRadius: 2,
                pointHoverRadius: 5,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                title: {
                  display: true,
                  text: "时间",
                },
                ticks: {
                  maxRotation: 45,
                  minRotation: 45,
                },
              },
              y: {
                beginAtZero: true,
                title: {
                  display: true,
                  text: "消息数量",
                },
              },
            },
            plugins: {
              legend: {
                display: true,
                position: "top",
              },
            },
          },
        });

        const hourCtx = document.getElementById("hourChart").getContext("2d");
        hourChart = new Chart(hourCtx, {
          type: "bar",
          data: {
            labels: [],
            datasets: [
              {
                label: "消息数",
                data: [],
                backgroundColor: "rgba(102, 126, 234, 0.8)",
                borderColor: "#667eea",
                borderWidth: 1,
                borderRadius: 8,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                title: {
                  display: true,
                  text: "时间",
                },
                ticks: {
                  maxRotation: 45,
                  minRotation: 45,
                },
              },
              y: {
                beginAtZero: true,
                title: {
                  display: true,
                  text: "消息数量",
                },
              },
            },
            plugins: {
              legend: {
                display: true,
                position: "top",
              },
            },
          },
        });
      }

      // 加载分钟数据
      async function loadMinuteData() {
        const hours = document.getElementById("hoursRange").value;
        try {
          const response = await fetch(`/api/messages/minute?hours=${hours}`);
          const data = await response.json();

          const labels = data.map((item) => item.minute);
          const values = data.map((item) => item.count);

          minuteChart.data.labels = labels;
          minuteChart.data.datasets[0].data = values;
          minuteChart.update();

          updateStats(values);
        } catch (error) {
          console.error("Failed to load minute data:", error);
        }
      }

      // 加载小时数据
      async function loadHourData() {
        const days = document.getElementById("daysRange").value;
        try {
          const response = await fetch(`/api/messages/hour?days=${days}`);
          const data = await response.json();

          const labels = data.map((item) => item.hour);
          const values = data.map((item) => item.count);

          hourChart.data.labels = labels;
          hourChart.data.datasets[0].data = values;
          hourChart.update();
        } catch (error) {
          console.error("Failed to load hour data:", error);
        }
      }

      // 加载统计数据
      async function loadStats() {
        try {
          const response = await fetch("/api/messages/total");
          const data = await response.json();

          document.getElementById("totalMessages").textContent =
            data.total.toLocaleString();
          document.getElementById("todayMessages").textContent =
            data.today.toLocaleString();
        } catch (error) {
          console.error("Failed to load stats:", error);
        }
      }

      // 加载群聊排行
      async function loadGroupData() {
        try {
          const response = await fetch("/api/messages/group?limit=10");
          const data = await response.json();

          const tbody = document.querySelector("#groupTable tbody");
          tbody.innerHTML = "";

          if (data.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="3" class="no-data">暂无数据</td></tr>';
            return;
          }

          data.forEach((item, index) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${item.room_name || "未知群聊"}</td>
                        <td>${item.message_count.toLocaleString()}</td>
                    `;
            tbody.appendChild(tr);
          });
        } catch (error) {
          console.error("Failed to load group data:", error);
        }
      }

      // 更新统计信息
      function updateStats(values) {
        if (values.length === 0) {
          document.getElementById("avgPerMinute").textContent = "0";
          document.getElementById("maxPerMinute").textContent = "0";
          return;
        }

        const sum = values.reduce((a, b) => a + b, 0);
        const avg = Math.round(sum / values.length);
        const max = Math.max(...values);

        document.getElementById("avgPerMinute").textContent = avg;
        document.getElementById("maxPerMinute").textContent = max;
      }

      // 页面加载完成后初始化
      document.addEventListener("DOMContentLoaded", () => {
        initCharts();
        loadMinuteData();
        loadHourData();
        loadStats();
        loadGroupData();
      });

      // 定时刷新（每30秒）
      setInterval(() => {
        loadMinuteData();
        loadStats();
      }, 30000);
    </script>
  </body>
</html>
